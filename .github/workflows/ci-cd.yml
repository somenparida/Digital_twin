name: CI/CD — Test, Build, and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_BACKEND: digital-twin-devops-backend
  IMAGE_FRONTEND: digital-twin-devops-frontend
  REGISTRY: ghcr.io
  GITHUB_USERNAME: ${{ github.actor }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest

  test-frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build:
    needs: [test-backend, test-frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_FRONTEND }}:latest

  deploy-to-ec2:
    needs: [deploy]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip deploy when EC2 secrets are missing
        if: ${{ env.EC2_HOST == '' || env.EC2_SSH_KEY == '' }}
        run: 'echo "Skipping EC2 deploy: set EC2_HOST and EC2_SSH_KEY repository secrets to enable deployment."'

      - name: Prepare SSH private key
        if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
        shell: bash
        run: |
          # Support both true multiline secrets and single-line values with \n escapes.
          printf '%b' "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keygen -y -f /tmp/deploy_key >/dev/null

      - name: Preflight SSH connectivity check
        if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
        shell: bash
        run: |
          set -e
          # Validate TCP reachability before invoking deployment action.
          timeout 20 bash -c "cat < /dev/null > /dev/tcp/$EC2_HOST/22"
          ssh -i /tmp/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ec2-user@$EC2_HOST 'echo SSH_OK'

      - name: Deploy to EC2 via SSH
        if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key_path: /tmp/deploy_key
          port: 22
          timeout: 30s
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            PROJECT_DIR="/home/ec2-user/Digital_twin"

            # Bootstrap prerequisites on fresh Amazon Linux hosts.
            if ! command -v git >/dev/null 2>&1; then
              sudo dnf install -y git
            fi
            if ! command -v docker >/dev/null 2>&1; then
              sudo dnf install -y docker
            fi
            sudo systemctl enable --now docker

            # Prefer Docker Compose plugin; fallback to standalone binary when unavailable.
            if ! sudo docker compose version >/dev/null 2>&1; then
              if ! command -v docker-compose >/dev/null 2>&1; then
                if command -v curl >/dev/null 2>&1; then
                  sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
                elif command -v wget >/dev/null 2>&1; then
                  sudo wget -O /usr/local/bin/docker-compose "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64"
                else
                  sudo dnf install -y wget
                  sudo wget -O /usr/local/bin/docker-compose "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64"
                fi
                sudo chmod +x /usr/local/bin/docker-compose
              fi
              COMPOSE_CMD="sudo docker-compose"
            else
              COMPOSE_CMD="sudo docker compose"
            fi

            # Pull latest deployment files
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi
            cd "$PROJECT_DIR"
            git pull origin main

            # Update docker-compose with latest image tags (GitHub Container Registry)
            sed -i "s|image:.*backend.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_BACKEND }}:latest|g" docker-compose.yml
            sed -i "s|image:.*frontend.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_FRONTEND }}:latest|g" docker-compose.yml

            # Restart services
            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d --remove-orphans
            $COMPOSE_CMD ps
