name: CI/CD — Test, Build, and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_BACKEND: digital-twin-devops-backend
  IMAGE_FRONTEND: digital-twin-devops-frontend
  REGISTRY: ghcr.io
  GITHUB_USERNAME: ${{ github.actor }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest

  test-frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build:
    needs: [test-backend, test-frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_FRONTEND }}:latest

  deploy-to-ec2:
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip deploy when EC2 secrets are missing
        if: ${{ env.EC2_HOST == '' || env.EC2_SSH_KEY == '' }}
        run: 'echo "Skipping EC2 deploy: set EC2_HOST and EC2_SSH_KEY repository secrets to enable deployment."'

      - name: Prepare SSH private key
        if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
        shell: bash
        run: |
          # Support both true multiline secrets and single-line values with \n escapes.
          printf '%b' "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keygen -y -f /tmp/deploy_key >/dev/null

      - name: Deploy to EC2 via SSH
        if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key_path: /tmp/deploy_key
          port: 22
          script: |
            # Pull latest deployment files
            cd /home/ec2-user/Digital_twin || git clone https://github.com/${{ github.repository }}.git /home/ec2-user/Digital_twin
            cd /home/ec2-user/Digital_twin
            git pull origin main
            
            # Update docker-compose with latest image tags (use GitHub Container Registry)
            sed -i "s|image:.*backend.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_BACKEND }}:latest|g" docker-compose.yml
            sed -i "s|image:.*frontend.*|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_FRONTEND }}:latest|g" docker-compose.yml
            
            # Restart services
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
