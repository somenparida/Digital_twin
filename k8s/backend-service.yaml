# NodePort exposes the backend to cluster nodes (and for demos, browser can hit NodeIP:nodePort).
# In-cluster clients (e.g. frontend nginx) use DNS name `backend` on port 8000.
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: campus-backend
spec:
  type: NodePort
  selector:
    app: campus-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800
